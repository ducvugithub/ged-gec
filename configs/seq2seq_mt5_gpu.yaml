# mT5-base configuration for Finnish GEC
# Multilingual T5 - good baseline

project_name: finnish-gec
run_name: mt5-base-revita

model:
  type: mt5
  pretrained_model: google/mt5-base
  task_prefix: "grammar: "  # T5-style models need prefix
  max_source_length: 512
  max_target_length: 512

data:
  train_path: data/revita/splits/train_augmented_random_greedy_errdensity20_clean_seed42.jsonl
  val_path: data/revita/splits/val_augmented_random_greedy_errdensity20_clean_seed42.jsonl
  test_path: data/revita/splits/test_augmented_random_greedy_errdensity20_clean_seed42.jsonl
  use_weights: false           # Use training_weight for balanced learning

training:
  output_dir: /scratch/project_2006601/GEC/experiments/mt5-base
  num_epochs: 5
  batch_size: 4
  eval_batch_size: 8
  gradient_accumulation_steps: 4  # Effective batch size = 16 (same as ByT5)
  learning_rate: 5e-5
  weight_decay: 0.01
  warmup_steps: 500

  # Evaluation
  evaluation_strategy: steps
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss

  # Hardware
  fp16: true  # Set to true only on CUDA GPUs
  dataloader_num_workers: 4

  # Logging
  logging_steps: 100
  use_wandb: false
  report_to: none
